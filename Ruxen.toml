[package]
name = "canvas"
version = "0.1.0"
edition = "2026"
description = "L1 engine for the Ruxen GUI stack: cross-platform windowing, input, and a Skia-backed 2D canvas via C FFI."

[build]
type = "library"

# L1 is the ONLY layer permitted to be unsafe / FFI / platform-specific.
#   - Skia : the 2D canvas (Chrome/Flutter's renderer), via the prebuilt
#            libSkiaSharp (flat sk_* C API).
#   - SDL2 : windowing, input, event pump for the live-window presenter.
#
# DECISION (docs/SKIA.md, docs/ROADMAP.md): both are brought in by FETCH +
# dlopen, NOT vendor + link. runtime/fetch_skia.sh SHA-pins and downloads
# libSkiaSharp; the C shim dlopen()s it (and SDL2) at runtime. So there are NO
# link-time system libraries and NO dev packages — this table is intentionally
# empty. Only a curated subset of the sk_* API is bound, grown method-by-method
# (docs/FFI.md).
[system_libs]
libs = []
