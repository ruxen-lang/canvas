[package]
name = "canvas"
version = "0.1.0"
edition = "2026"
description = "L1 engine for the Ruxen GUI stack: cross-platform windowing, input, and a Skia-backed 2D canvas via C FFI."

[build]
type = "library"

# L1 is the ONLY layer permitted to be unsafe / FFI / platform-specific.
#   - SDL2/SDL3 : windowing, input, event pump, GL/Metal context (desktop + mobile).
#   - Skia      : the 2D canvas (Flutter's renderer): GPU rendering plus text
#                 shaping/i18n via bundled HarfBuzz/FreeType.
# The full Skia C library is vendored; only a curated subset of methods is
# exposed via FFI, grown method-by-method (see docs/FFI.md).
#
# NOTE: link names are placeholders pending the L1 build/link decision
# (prebuilt-per-platform vs build-from-source) — see docs/ROADMAP.md.
[system_libs]
libs = ["SDL2", "skia"]
